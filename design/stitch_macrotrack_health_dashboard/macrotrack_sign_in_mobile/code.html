<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MacroTrack - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#008378",
                    "outline": "#6d7a77",
                    "secondary-fixed": "#e0e3e5",
                    "on-tertiary-fixed-variant": "#404758",
                    "surface": "#f8f9ff",
                    "primary-fixed": "#89f5e7",
                    "on-primary": "#ffffff",
                    "secondary": "#5c5f61",
                    "on-tertiary": "#ffffff",
                    "primary": "#00685f",
                    "on-tertiary-fixed": "#141b2b",
                    "surface-tint": "#006a61",
                    "surface-dim": "#cbdbf5",
                    "tertiary-fixed-dim": "#c0c6db",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#c4c7c9",
                    "on-secondary-container": "#626567",
                    "surface-variant": "#d3e4fe",
                    "surface-container-highest": "#d3e4fe",
                    "on-surface-variant": "#3d4947",
                    "on-error": "#ffffff",
                    "on-surface": "#0b1c30",
                    "on-secondary-fixed": "#191c1e",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#e5eeff",
                    "outline-variant": "#bcc9c6",
                    "error-container": "#ffdad6",
                    "tertiary": "#555c6e",
                    "surface-bright": "#f8f9ff",
                    "secondary-container": "#e0e3e5",
                    "inverse-surface": "#213145",
                    "tertiary-container": "#6e7487",
                    "on-background": "#0b1c30",
                    "surface-container-low": "#eff4ff",
                    "on-primary-fixed": "#00201d",
                    "inverse-primary": "#6bd8cb",
                    "tertiary-fixed": "#dce2f7",
                    "on-primary-container": "#f4fffc",
                    "on-tertiary-container": "#fefcff",
                    "primary-fixed-dim": "#6bd8cb",
                    "on-secondary-fixed-variant": "#444749",
                    "inverse-on-surface": "#eaf1ff",
                    "error": "#ba1a1a",
                    "background": "#f8f9ff",
                    "surface-container-high": "#dce9ff",
                    "on-primary-fixed-variant": "#005049"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "gutter": "16px",
                    "container-margin-mobile": "16px",
                    "md": "16px",
                    "sm": "8px",
                    "2xl": "48px",
                    "container-margin-desktop": "40px",
                    "xs": "4px",
                    "xl": "32px",
                    "base": "4px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Manrope"],
                    "body-md": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "label-md": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "data-display": ["Manrope"],
                    "body-lg": ["Manrope"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "data-display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.03em", "fontWeight": "800"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-container-margin-mobile md:p-container-margin-desktop antialiased">
<!-- TopAppBar Structure applied as fixed header for context, though centered card is primary -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-container-margin-mobile py-sm bg-background/80 backdrop-blur-md z-10 md:hidden">
<button aria-label="Menu" class="text-primary cursor-pointer active:scale-95 transition-transform p-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">monitoring</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary">MacroTrack</div>
<div class="w-10"></div> <!-- Spacer to center brand -->
</header>
<main class="w-full max-w-[400px] flex flex-col items-center z-10 pt-16 md:pt-0">
<!-- Logo & Tagline Area -->
<div class="mb-xl flex flex-col items-center text-center">
<div class="w-20 h-20 bg-primary-container rounded-3xl flex items-center justify-center mb-md shadow-[0px_8px_24px_rgba(0,104,95,0.15)]">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-xs">MacroTrack</h1>
<p class="font-body-md text-body-md text-secondary">Track your macros, every day</p>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-lowest rounded-[24px] shadow-[0px_4px_20px_rgba(0,0,0,0.04)] p-lg overflow-hidden border border-outline-variant/30">
<!-- Tabs -->
<div class="flex relative mb-xl border-b border-surface-container-highest">
<button class="flex-1 pb-sm font-label-md text-label-md text-primary border-b-2 border-primary transition-colors text-center cursor-pointer tap-highlight-transparent" id="tab-signin">
                    Sign In
                </button>
<button class="flex-1 pb-sm font-label-md text-label-md text-secondary hover:text-on-surface transition-colors text-center cursor-pointer tap-highlight-transparent" id="tab-signup">
                    Sign Up
                </button>
</div>
<!-- Sign In Form -->
<form class="flex flex-col gap-md" id="form-signin" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-sm">mail</span>
<input class="w-full min-h-[48px] pl-12 pr-md rounded-xl bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body-md outline-none transition-all" id="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-sm">lock</span>
<input class="w-full min-h-[48px] pl-12 pr-12 rounded-xl bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body-md outline-none transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-secondary px-sm cursor-pointer hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="flex justify-end mb-sm">
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">Forgot password?</a>
</div>
<button class="w-full min-h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-xl shadow-[0px_4px_12px_rgba(0,104,95,0.2)] hover:bg-surface-tint hover:shadow-[0px_6px_16px_rgba(0,104,95,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="mt-md text-center">
<span class="font-body-md text-body-md text-secondary">Don't have an account? </span>
<button class="font-label-md text-label-md text-primary hover:underline cursor-pointer" onclick="switchTab('signup')" type="button">Sign up</button>
</div>
</form>
<!-- Sign Up Form (Hidden by default) -->
<form class="flex flex-col gap-md hidden" id="form-signup" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="name-signup">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-sm">person</span>
<input class="w-full min-h-[48px] pl-12 pr-md rounded-xl bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body-md outline-none transition-all" id="name-signup" placeholder="Enter your name" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email-signup">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-sm">mail</span>
<input class="w-full min-h-[48px] pl-12 pr-md rounded-xl bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body-md outline-none transition-all" id="email-signup" placeholder="Enter your email" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="password-signup">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-sm">lock</span>
<input class="w-full min-h-[48px] pl-12 pr-12 rounded-xl bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface font-body-md outline-none transition-all" id="password-signup" placeholder="Create a password" type="password"/>
</div>
</div>
<button class="w-full min-h-[48px] bg-primary-container text-on-primary-container font-label-md text-label-md rounded-xl shadow-[0px_4px_12px_rgba(0,131,120,0.2)] hover:opacity-90 hover:shadow-[0px_6px_16px_rgba(0,131,120,0.3)] active:scale-[0.98] transition-all mt-sm" type="submit">
                    Create Account
                </button>
</form>
</div>
</main>
<!-- Suppressed Navigation Shells: Transactional Page -> Hidden -->
<script>
        function switchTab(tab) {
            const signinTab = document.getElementById('tab-signin');
            const signupTab = document.getElementById('tab-signup');
            const signinForm = document.getElementById('form-signin');
            const signupForm = document.getElementById('form-signup');

            if (tab === 'signin') {
                signinTab.className = "flex-1 pb-sm font-label-md text-label-md text-primary border-b-2 border-primary transition-colors text-center cursor-pointer tap-highlight-transparent";
                signupTab.className = "flex-1 pb-sm font-label-md text-label-md text-secondary hover:text-on-surface border-b-2 border-transparent transition-colors text-center cursor-pointer tap-highlight-transparent";
                signinForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                signupTab.className = "flex-1 pb-sm font-label-md text-label-md text-primary border-b-2 border-primary transition-colors text-center cursor-pointer tap-highlight-transparent";
                signinTab.className = "flex-1 pb-sm font-label-md text-label-md text-secondary hover:text-on-surface border-b-2 border-transparent transition-colors text-center cursor-pointer tap-highlight-transparent";
                signupForm.classList.remove('hidden');
                signinForm.classList.add('hidden');
            }
        }

        document.getElementById('tab-signin').addEventListener('click', () => switchTab('signin'));
        document.getElementById('tab-signup').addEventListener('click', () => switchTab('signup'));
    </script>
</body></html>
