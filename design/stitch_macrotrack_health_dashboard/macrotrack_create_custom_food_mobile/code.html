<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MacroTrack - Custom Food</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#008378",
                        "outline": "#6d7a77",
                        "secondary-fixed": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#404758",
                        "surface": "#f8f9ff",
                        "primary-fixed": "#89f5e7",
                        "on-primary": "#ffffff",
                        "secondary": "#5c5f61",
                        "on-tertiary": "#ffffff",
                        "primary": "#00685f",
                        "on-tertiary-fixed": "#141b2b",
                        "surface-tint": "#006a61",
                        "surface-dim": "#cbdbf5",
                        "tertiary-fixed-dim": "#c0c6db",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c4c7c9",
                        "on-secondary-container": "#626567",
                        "surface-variant": "#d3e4fe",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface-variant": "#3d4947",
                        "on-error": "#ffffff",
                        "on-surface": "#0b1c30",
                        "on-secondary-fixed": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#e5eeff",
                        "outline-variant": "#bcc9c6",
                        "error-container": "#ffdad6",
                        "tertiary": "#555c6e",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#e0e3e5",
                        "inverse-surface": "#213145",
                        "tertiary-container": "#6e7487",
                        "on-background": "#0b1c30",
                        "surface-container-low": "#eff4ff",
                        "on-primary-fixed": "#00201d",
                        "inverse-primary": "#6bd8cb",
                        "tertiary-fixed": "#dce2f7",
                        "on-primary-container": "#f4fffc",
                        "on-tertiary-container": "#fefcff",
                        "primary-fixed-dim": "#6bd8cb",
                        "on-secondary-fixed-variant": "#444749",
                        "inverse-on-surface": "#eaf1ff",
                        "error": "#ba1a1a",
                        "background": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "on-primary-fixed-variant": "#005049"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "gutter": "16px",
                        "container-margin-mobile": "16px",
                        "md": "16px",
                        "sm": "8px",
                        "2xl": "48px",
                        "container-margin-desktop": "40px",
                        "xs": "4px",
                        "xl": "32px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "data-display": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.03em", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Form Input Styles */
        .form-input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }
        
        .floating-input {
            width: 100%;
            min-height: 56px;
            padding: 24px 16px 8px;
            background-color: transparent;
            border: 1px solid theme('colors.outline-variant');
            border-radius: theme('borderRadius.xl');
            color: theme('colors.on-surface');
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .floating-input:focus {
            outline: none;
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }
        
        .floating-label {
            position: absolute;
            top: 16px;
            left: 16px;
            pointer-events: none;
            color: theme('colors.on-surface-variant');
            transition: transform 0.2s, font-size 0.2s, color 0.2s;
            transform-origin: top left;
        }
        
        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            transform: translateY(-8px) scale(0.75);
            color: theme('colors.primary');
        }

        .macro-input-group {
            display: flex;
            align-items: center;
            background: theme('colors.surface-container-lowest');
            border: 1px solid theme('colors.outline-variant');
            border-radius: theme('borderRadius.xl');
            padding: 8px 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .macro-input-group:focus-within {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }

        .macro-input {
            flex: 1;
            border: none;
            background: transparent;
            text-align: right;
            padding-right: 8px;
            font-size: 20px;
            font-weight: 600;
            color: theme('colors.on-surface');
        }

        .macro-input:focus {
            outline: none;
            box-shadow: none;
        }

        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pb-[120px]">
<!-- Top App Bar - Linear/Transactional Intent (No Shell Navigation) -->
<header class="w-full sticky top-0 bg-background z-40 px-container-margin-mobile py-sm flex justify-between items-center flat no shadows">
<div class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform text-primary" onclick="history.back()">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface text-center flex-1 pr-8">Custom Food</h1>
</header>
<main class="flex-1 w-full max-w-[600px] mx-auto px-container-margin-mobile pt-lg pb-xl">
<!-- Live Preview Card -->
<section class="bg-surface-container-lowest rounded-[24px] p-5 shadow-[0px_4px_20px_rgba(0,0,0,0.04)] mb-lg flex flex-col items-center justify-center text-center">
<h2 class="font-label-md text-label-md text-secondary mb-1">Estimated Calories</h2>
<div class="font-data-display text-data-display text-primary flex items-baseline gap-1">
<span id="calorie-display">0</span>
<span class="font-headline-md text-headline-md text-primary-fixed-dim">kcal</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 text-sm opacity-80">Based on macro distribution</p>
</section>
<form class="flex flex-col gap-sm" id="custom-food-form">
<!-- Basic Details -->
<div class="mb-lg">
<h3 class="font-headline-md text-headline-md text-on-surface mb-md">Details</h3>
<div class="form-input-wrapper">
<input class="floating-input font-body-lg text-body-lg" id="food-name" placeholder=" " required="" type="text"/>
<label class="floating-label font-body-md text-body-md" for="food-name">Food Name</label>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="form-input-wrapper mb-0">
<input class="floating-input font-body-lg text-body-lg" id="serving-amount" min="0" placeholder=" " required="" step="0.1" type="number" value="1"/>
<label class="floating-label font-body-md text-body-md" for="serving-amount">Amount</label>
</div>
<div class="relative">
<select class="w-full min-h-[56px] px-4 py-2 bg-transparent border border-outline-variant rounded-xl text-on-surface font-body-md text-body-md appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary h-full" id="serving-unit">
<option value="g">Grams (g)</option>
<option value="ml">Milliliters (ml)</option>
<option value="oz">Ounces (oz)</option>
<option value="cup">Cup</option>
<option value="serving">Serving</option>
<option value="piece">Piece</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Macros -->
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-md">Macronutrients <span class="text-sm font-normal text-on-surface-variant">(per serving)</span></h3>
<div class="macro-input-group">
<div class="w-3 h-3 rounded-full bg-[#E57373] mr-3"></div>
<label class="font-label-md text-label-md text-on-surface flex-1" for="macro-protein">Protein</label>
<input class="macro-input macro-calc" id="macro-protein" min="0" placeholder="0" required="" step="0.1" type="number"/>
<span class="font-body-md text-body-md text-on-surface-variant">g</span>
</div>
<div class="macro-input-group">
<div class="w-3 h-3 rounded-full bg-[#64B5F6] mr-3"></div>
<label class="font-label-md text-label-md text-on-surface flex-1" for="macro-carbs">Carbs</label>
<input class="macro-input macro-calc" id="macro-carbs" min="0" placeholder="0" required="" step="0.1" type="number"/>
<span class="font-body-md text-body-md text-on-surface-variant">g</span>
</div>
<div class="macro-input-group">
<div class="w-3 h-3 rounded-full bg-[#FFB74D] mr-3"></div>
<label class="font-label-md text-label-md text-on-surface flex-1" for="macro-fats">Fats</label>
<input class="macro-input macro-calc" id="macro-fats" min="0" placeholder="0" required="" step="0.1" type="number"/>
<span class="font-body-md text-body-md text-on-surface-variant">g</span>
</div>
</div>
<!-- Optional Fields Divider -->
<div class="mt-lg mb-md border-t border-surface-variant pt-lg">
<button class="flex items-center text-primary font-label-md text-label-md mx-auto py-2 px-4 rounded-full hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined mr-2" data-icon="add">add</span>
                    Add Optional Details (Barcode, Brand)
                </button>
</div>
</form>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-surface-variant p-container-margin-mobile flex gap-4 z-50 shadow-[0px_-4px_20px_rgba(0,0,0,0.04)]">
<button class="flex-1 py-3 px-4 bg-[#F0FDFA] text-primary font-label-md text-label-md rounded-full border border-primary-fixed-dim hover:bg-surface-container-low active:scale-95 transition-all text-center" type="button">
            Save &amp; Add
        </button>
<button class="flex-[2] py-3 px-4 bg-primary text-on-primary font-label-md text-label-md rounded-full hover:bg-surface-tint active:scale-95 transition-all shadow-sm text-center" form="custom-food-form" type="submit">
            Save Food
        </button>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const proteinInput = document.getElementById('macro-protein');
            const carbsInput = document.getElementById('macro-carbs');
            const fatsInput = document.getElementById('macro-fats');
            const calorieDisplay = document.getElementById('calorie-display');

            function calculateCalories() {
                const protein = parseFloat(proteinInput.value) || 0;
                const carbs = parseFloat(carbsInput.value) || 0;
                const fats = parseFloat(fatsInput.value) || 0;

                // Standard Atwater factors: Protein 4, Carbs 4, Fat 9
                const calories = Math.round((protein * 4) + (carbs * 4) + (fats * 9));
                
                // Animate the number change
                animateValue(calorieDisplay, parseInt(calorieDisplay.innerText) || 0, calories, 300);
            }

            function animateValue(obj, start, end, duration) {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }

            // Attach listeners to all macro inputs
            const macroInputs = document.querySelectorAll('.macro-calc');
            macroInputs.forEach(input => {
                input.addEventListener('input', calculateCalories);
            });
            
            // Prevent form submission for demo
            document.getElementById('custom-food-form').addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Food Saved!');
            });
        });
    </script>
</body></html>
