name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  netlify-deploy-status:
    name: Netlify deploy status
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Netlify deploy of this commit
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::warning::NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID secrets not set; skipping deploy status check."
            echo "### Netlify deploy status: :grey_question: skipped (missing secrets)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Looking for Netlify deploy of commit $GITHUB_SHA ..."

          # Netlify builds are triggered by its own GitHub integration, so the
          # deploy may not exist yet when this job starts. Poll for up to 15 min.
          for i in $(seq 1 90); do
            deploy=$(curl -sf -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=30" \
              | jq --arg sha "$GITHUB_SHA" '[.[] | select(.commit_ref == $sha)] | first')

            state=$(echo "$deploy" | jq -r '.state // empty')
            url=$(echo "$deploy" | jq -r '.deploy_ssl_url // .deploy_url // empty')

            case "$state" in
              ready)
                echo "Deploy succeeded: $url"
                echo "### Netlify deploy status: :white_check_mark: ready" >> "$GITHUB_STEP_SUMMARY"
                echo "$url" >> "$GITHUB_STEP_SUMMARY"
                exit 0
                ;;
              error)
                msg=$(echo "$deploy" | jq -r '.error_message // "unknown error"')
                echo "::error::Netlify deploy failed: $msg"
                echo "### Netlify deploy status: :x: error — $msg" >> "$GITHUB_STEP_SUMMARY"
                exit 1
                ;;
              "")
                echo "[$i/90] No deploy for this commit yet, waiting..."
                ;;
              *)
                echo "[$i/90] Deploy state: $state, waiting..."
                ;;
            esac
            sleep 10
          done

          echo "::error::Timed out waiting for the Netlify deploy of $GITHUB_SHA"
          echo "### Netlify deploy status: :hourglass: timed out after 15 min" >> "$GITHUB_STEP_SUMMARY"
          exit 1
